<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Secure Agent Portal Login - Grand Voyage</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="responsive.css" />
    <link rel="stylesheet" href="animations.css" />
  </head>
  <body class="bg-dark align-items-center justify-content-center d-flex min-vh-100 py-5" style="background: radial-gradient(circle at top left, #1a2536, #0e141d);">

    <div class="container">
      <div class="row justify-content-center w-100 m-0">
        <div class="col-md-7 col-lg-5 max-w-7xl">
          <div class="text-center mb-4">
            <a href="index.html" class="d-inline-flex align-items-center gap-2 text-decoration-none text-white fs-3 mb-2">
              <i class="bi bi-globe-americas text-warning-emphasis fs-2"></i>
              <span class="font-display fw-bold tracking-wider">GRAND <span class="fw-light">VOYAGE</span></span>
            </a>
            <p class="text-muted fs-14">Chamber Operations & Guest Portal Terminal</p>
          </div>

          <div class="glass-card p-5 border border-secondary border-opacity-25 shadow-lg bg-dark bg-opacity-75 text-white">
            <h3 class="font-display text-center mb-4 text-warning">Secure Key Authentication</h3>
            
            <form onsubmit="event.preventDefault(); window.showToastNotification('Secure Login Granted! Redirecting to chambers dashboard...', 'success'); setTimeout(() => { window.location.href = 'dashboard.html'; }, 1200)">
              <div class="mb-3">
                <label class="form-label fs-14 text-white-50">Authorized Email Credentials</label>
                <div class="input-group">
                  <span class="input-group-text bg-transparent border-end-0 border-secondary border-opacity-50"><i class="bi bi-shield-lock text-muted"></i></span>
                  <input type="email" class="form-control bg-transparent border-start-0 border-secondary border-opacity-50 text-white custom-form-control" placeholder="agent@grandvoyage.com" required>
                </div>
              </div>

              <div class="mb-4">
                <div class="d-flex justify-content-between align-items-center mb-2">
                  <label class="form-label fs-14 text-white-50 p-0 m-0">Security Passkey</label>
                  <a href="#" class="fs-12 text-warning text-decoration-none hover-primary">Request Key Recovery</a>
                </div>
                <div class="input-group">
                  <span class="input-group-text bg-transparent border-end-0 border-secondary border-opacity-50"><i class="bi bi-key text-muted"></i></span>
                  <input type="password" id="agentPassField" class="form-control bg-transparent border-start-0 border-secondary border-opacity-50 text-white custom-form-control" placeholder="••••••••" required>
                  <span class="input-group-text bg-transparent border-secondary border-opacity-50 text-muted cursor-pointer" id="passwordToggleBtn" style="cursor: pointer;"><i class="bi bi-eye"></i></span>
                </div>
              </div>

              <div class="d-flex justify-content-between align-items-center mb-4">
                <div class="form-check m-0 p-0 d-flex align-items-center gap-2">
                  <input type="checkbox" class="form-check-input ms-0 mt-0" id="rememberMeBox">
                  <label class="form-check-label fs-14 text-color-muted" for="rememberMeBox">Remember credentials</label>
                </div>
              </div>

              <button type="submit" class="btn btn-premium-primary w-100 py-3 mb-4">Authenticate Direct Session</button>

              <!-- Social Auth alternatives -->
              <div class="text-center mb-3">
                <span class="text-muted fs-12 font-mono">OR DELEGATE TRUST via</span>
              </div>
              <div class="row g-2">
                <div class="col-6">
                  <button type="button" class="btn btn-outline-secondary w-100 d-flex align-items-center justify-content-center gap-2 py-2 fs-12 text-white border-secondary border-opacity-50" onclick="window.showToastNotification('Federated delegation authorized.', 'success')">
                    <i class="bi bi-google"></i> Google Cloud
                  </button>
                </div>
                <div class="col-6">
                  <button type="button" class="btn btn-outline-secondary w-100 d-flex align-items-center justify-content-center gap-2 py-2 fs-12 text-white border-secondary border-opacity-50" onclick="window.showToastNotification('Federated delegation authorized.', 'success')">
                    <i class="bi bi-microsoft"></i> ActiveDirectory
                  </button>
                </div>
              </div>
            </form>
          </div>

          <div class="text-center mt-4">
            <p class="text-muted fs-14">Awaiting access rights? <a href="register.html" class="text-warning text-decoration-none">File Application Registration</a></p>
          </div>
        </div>
      </div>
    </div>

    <!-- UI/UX Native Core Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="app.js"></script>
    <script src="jquery-app.js"></script>

    <script>
      $(function() {
        // Simple password toggle logic
        $('#passwordToggleBtn').on('click', function() {
          const passInput = $('#agentPassField');
          const type = passInput.attr('type') === 'password' ? 'text' : 'password';
          passInput.attr('type', type);
          $(this).find('i').toggleClass('bi-eye bi-eye-slash');
        });
      });
    </script>
  </body>
</html>
